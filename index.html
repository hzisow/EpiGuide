<!DOCTYPE html>
<html lang="en">
<head>

  <title>EpiGuide</title>
  <meta name="description" content="Anaphylaxis bystander-response guide — find epinephrine, recognize symptoms, administer it, and get EMS there fast." />

  <!-- PWA / Add to Home Screen -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#E03131" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EpiGuide" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- Uses the Apple system font (San Francisco) — no web font to load. -->

  <!-- Design system -->
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />

<body>

    <nav class="tabbar" id="tabbar" aria-label="Primary"></nav>
  </main>

  <script type="module" src="js/app.js"></script>
